<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Norges Lover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b2540"/>
      <stop offset="100%" stop-color="#142e56"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ba0c2f"/>
      <stop offset="100%" stop-color="#e85a47"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Title block -->
  <g transform="translate(60, 110)">
    <text x="0" y="0" fill="#fff" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Inter, system-ui, sans-serif" font-size="58" font-weight="800" letter-spacing="-2">Norges Lover</text>
    <text x="0" y="48" fill="#a8c0e0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Inter, system-ui, sans-serif" font-size="20" font-weight="500" letter-spacing="0">A Git-versioned changelog for Norwegian law</text>
    <text x="0" y="82" fill="#7a92b8" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="14" letter-spacing="0">git diff v2024 v2025 -- lover/lov-1998-07-17-56.md</text>
  </g>

  <!-- Right-side commit graph visual -->
  <g transform="translate(820, 70)" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace" font-size="13">
    <!-- Vertical line connecting commits -->
    <line x1="20" y1="20" x2="20" y2="140" stroke="url(#accent)" stroke-width="2.5"/>

    <!-- Commit dots and labels -->
    <circle cx="20" cy="20" r="7" fill="#ba0c2f" stroke="#fff" stroke-width="2"/>
    <text x="44" y="18" fill="#fff" font-size="13" font-weight="600">v2025</text>
    <text x="44" y="33" fill="#a8c0e0" font-size="11">bærekraftsrapportering</text>

    <circle cx="20" cy="80" r="6" fill="#fff"/>
    <text x="44" y="78" fill="#fff" font-size="13" font-weight="600">v2024</text>
    <text x="44" y="93" fill="#a8c0e0" font-size="11">EU-direktiv 2022/2464</text>

    <circle cx="20" cy="140" r="6" fill="#fff" opacity="0.5"/>
    <text x="44" y="138" fill="#a8c0e0" font-size="13" font-weight="600">v2023</text>
    <text x="44" y="153" fill="#7a92b8" font-size="11">…</text>
  </g>

  <!-- Stats footer -->
  <g transform="translate(60, 232)" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif">
    <text fill="#7a92b8" font-size="13" font-weight="500">
      <tspan fill="#fff" font-weight="700">4,204</tspan> lover &amp; forskrifter ·
      <tspan fill="#fff" font-weight="700">31,459</tspan> dated amendments ·
      <tspan fill="#fff" font-weight="700">2,627</tspan> Atom feeds ·
      <tspan fill="#fff" font-weight="700">2001–2026</tspan> coverage ·
      <tspan fill="#fff" font-weight="700">NLOD 2.0</tspan> · MIT
    </text>
  </g>
</svg>
