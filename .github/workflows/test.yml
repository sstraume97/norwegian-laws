name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'lovdata-loader/**'
      - 'lovdata-publisher/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packages and test dependencies
        run: |
          pip install -e "lovdata-loader/[test]"
          pip install -e "lovdata-publisher/[test]"

      - name: Run loader tests
        run: cd lovdata-loader && pytest tests/ -v

      - name: Run publisher tests
        run: cd lovdata-publisher && pytest tests/ -v
