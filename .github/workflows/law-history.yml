name: Build law history branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write

jobs:
  build-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-loader/ -e lovdata-publisher/

      - name: Cache historical Lovtidend archive
        uses: actions/cache@v4
        with:
          path: snapshot/lovtidend-avd1-2001-2025.tar.bz2
          key: lovtidend-historical-2001-2025

      - name: Download and parse laws
        run: lovdata-load --download --output snapshot

      - name: Build git history with backdated commits
        run: lovdata-publish --snapshot snapshot --build-history --repo-path /tmp/law-repo

      - name: Create yearly tags
        run: |
          cd /tmp/law-repo
          python3 -c "
          import sys
          sys.path.insert(0, '${{ github.workspace }}/lovdata-publisher/src')
          from lovdata_publisher.git_export import create_yearly_tags
          tags = create_yearly_tags('/tmp/law-repo')
          print(f'Created {len(tags)} yearly tags: {min(tags)}..{max(tags)}')
          "

      - name: Push law-history branch and tags
        run: |
          cd /tmp/law-repo
          git branch -m main law-history
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config http.postBuffer 524288000
          git gc --aggressive --prune=now
          
          # Push in batches — GitHub rejects large single pushes
          TOTAL=$(git rev-list --count law-history)
          BATCH=500
          echo "Total commits: $TOTAL, pushing in batches of $BATCH"
          
          COMMITS=$(git rev-list --reverse law-history)
          i=0
          LAST=""
          while IFS= read -r sha; do
            i=$((i + 1))
            LAST="$sha"
            if [ $((i % BATCH)) -eq 0 ]; then
              echo "Pushing commit $i/$TOTAL ($sha)"
              git push -f origin "$sha:refs/heads/law-history"
            fi
          done <<< "$COMMITS"
          
          # Push remaining
          if [ -n "$LAST" ]; then
            echo "Pushing final ($i commits)"
            git push -f origin law-history
          fi
          
          git push -f origin --tags
