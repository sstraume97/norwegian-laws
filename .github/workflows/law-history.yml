name: Build law history branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write

jobs:
  build-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-loader/ -e lovdata-publisher/

      - name: Cache historical Lovtidend archive
        uses: actions/cache@v4
        with:
          path: snapshot/lovtidend-avd1-2001-2025.tar.bz2
          key: lovtidend-historical-2001-2025

      - name: Download and parse laws
        run: lovdata-load --download --output snapshot

      - name: Build and push law history
        run: |
          set -e

          # Build in separate repo
          lovdata-publish --snapshot snapshot --build-history --repo-path /tmp/law-repo

          # Tag
          cd /tmp/law-repo
          python3 -c "
          import sys
          sys.path.insert(0, '${{ github.workspace }}/lovdata-publisher/src')
          from lovdata_publisher.git_export import create_yearly_tags
          tags = create_yearly_tags('/tmp/law-repo')
          print(f'Created {len(tags)} yearly tags: {min(tags)}..{max(tags)}')
          "

          # Push directly from /tmp/law-repo (no fetch into workspace — avoids tag clobber)
          cd /tmp/law-repo
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Branch: force-push main -> law-history
          git push --force origin main:refs/heads/law-history

          # Tags: force-push all yearly tags (+ refspec forces remote update)
          git push --force origin "+refs/tags/v*:refs/tags/v*"
