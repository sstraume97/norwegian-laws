name: Build law history branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write

jobs:
  build-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-loader/ -e lovdata-publisher/

      - name: Cache historical Lovtidend archive
        uses: actions/cache@v4
        with:
          path: snapshot/lovtidend-avd1-2001-2025.tar.bz2
          key: lovtidend-historical-2001-2025

      - name: Download and parse laws
        run: lovdata-load --download --output snapshot

      - name: Build git history with backdated commits
        run: lovdata-publish --snapshot snapshot --build-history --repo-path /tmp/law-repo

      - name: Create yearly tags
        run: |
          cd /tmp/law-repo
          python3 -c "
          import sys
          sys.path.insert(0, '${{ github.workspace }}/lovdata-publisher/src')
          from lovdata_publisher.git_export import create_yearly_tags
          tags = create_yearly_tags('/tmp/law-repo')
          print(f'Created {len(tags)} yearly tags: {min(tags)}..{max(tags)}')
          "

      - name: Push law-history branch and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/law-repo
          git branch -m main law-history
          git gc --aggressive --prune=now
          echo "Pack size: $(du -sh .git/objects/pack/ 2>/dev/null | cut -f1 || echo N/A)"
          
          # Bundle and push via a fresh clone to avoid fast-import pack issues
          git bundle create /tmp/laws.bundle law-history --tags
          echo "Bundle size: $(du -sh /tmp/laws.bundle | cut -f1)"
          
          cd /tmp
          rm -rf push-repo
          git clone /tmp/laws.bundle push-repo -b law-history
          cd push-repo
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin law-history
          
          # Push tags from original repo
          cd /tmp/law-repo
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin --tags
