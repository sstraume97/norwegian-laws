name: Poll Lovdata for updates

on:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare Lovdata manifest against stored state
        id: check
        run: |
          curl -sf https://api.lovdata.no/v1/publicData/list \
            | jq -S 'sort_by(.filename) | map({filename, lastModified, sizeBytes})' \
            > /tmp/current.json

          if [ -f .github/state/lovdata-manifest.json ]; then
            jq -S 'sort_by(.filename) | map({filename, lastModified, sizeBytes})' \
              .github/state/lovdata-manifest.json > /tmp/stored.json
          else
            echo "[]" > /tmp/stored.json
          fi

          if cmp -s /tmp/current.json /tmp/stored.json; then
            echo "No Lovdata changes since last successful deploy"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Lovdata manifest changed:"
            diff /tmp/stored.json /tmp/current.json || true
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch lovdata-updated event
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=lovdata-updated
