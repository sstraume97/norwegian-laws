name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          pip install build
          python -m build

      # softprops/action-gh-release@v2 was used previously but it ALWAYS
      # tries to PATCH (finalize) the release after uploading assets, even
      # when --generate_release_notes is false. That PATCH errors with
      # 'already_exists: tag_name' when the release was created manually
      # via API just before the tag push, which is the v0.3.x workflow.
      # See v0.3.0 / v0.4.0 release attempts for the failure mode.
      #
      # gh CLI handles both cases cleanly: `gh release upload --clobber`
      # targets the existing release without touching the tag/body, and
      # `gh release create` is only used when no release exists yet.
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets..."
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Release $TAG does not exist, creating with auto notes..."
            gh release create "$TAG" dist/* --generate-notes --title "$TAG"
          fi
