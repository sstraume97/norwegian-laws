name: Update laws and deploy book

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lovdata-loader/**'
      - 'lovdata-publisher/**'
      - 'book/**'
      - '_quarto.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-laws:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-loader/ -e lovdata-publisher/

      - name: Compute week key for cache
        id: weekkey
        run: echo "key=$(date -u +%Y-W%U)" >> $GITHUB_OUTPUT

      - name: Cache Lovdata archives (weekly)
        uses: actions/cache@v4
        with:
          path: |
            snapshot/gjeldende-lover.tar.bz2
            snapshot/gjeldende-sentrale-forskrifter.tar.bz2
            snapshot/lovtidend-avd1-2001-2025.tar.bz2
          key: lovdata-archives-${{ steps.weekkey.outputs.key }}
          restore-keys: |
            lovdata-archives-

      - name: Download and parse laws
        run: lovdata-load --download --output snapshot

      - name: Format laws and generate Quarto chapters
        run: lovdata-publish --snapshot snapshot --output . --quarto

      - name: Commit law updates
        id: commit
        run: |
          git config user.name "Lovtidend"
          git config user.email "lovtidend@lovdata.no"
          git add lover/ forskrifter/ book/ _quarto.yml index.qmd laws.json
          git rm -r --cached historie/ 2>/dev/null || true
          git add historie/
          if git diff --staged --quiet; then
            echo "No changes to laws"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Oppdater lover og forskrifter fra Lovdata API $(date +%Y-%m-%d) [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy-book:
    needs: update-laws
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-publisher/

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        run: quarto render

      - name: Copy laws.json to site
        run: cp laws.json _site/laws.json

      - name: Merge law metadata into search index
        run: python -m lovdata_publisher.search_index _site laws.json

      - name: Generate per-law HTML pages and full-text search index
        run: lovdata-publish --post-render --output . --site-dir _site

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
