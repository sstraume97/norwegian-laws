name: Update laws and deploy book

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lovdata-loader/**'
      - 'lovdata-publisher/**'
      - 'book/**'
      - '_quarto.yml'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-laws:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-loader/ -e lovdata-publisher/

      - name: Compute week key for cache
        id: weekkey
        run: echo "key=$(date -u +%Y-W%U)" >> $GITHUB_OUTPUT

      - name: Cache Lovdata archives (weekly)
        uses: actions/cache@v4
        with:
          path: |
            snapshot/gjeldende-lover.tar.bz2
            snapshot/gjeldende-sentrale-forskrifter.tar.bz2
            snapshot/lovtidend-avd1-2001-2025.tar.bz2
          key: lovdata-archives-${{ steps.weekkey.outputs.key }}
          restore-keys: |
            lovdata-archives-

      - name: Download and parse laws
        run: lovdata-load --download --output snapshot

      - name: Format laws and generate Quarto chapters
        run: lovdata-publish --snapshot snapshot --output . --quarto

      - name: Update 'Recent amendments' section in README
        run: python -m lovdata_publisher.readme_updater README.md snapshot/amendments.db

      - name: Commit law updates
        id: commit
        run: |
          git config user.name "Lovtidend"
          git config user.email "lovtidend@lovdata.no"
          # Feeds and feed.xml are NOT committed — they're build artifacts
          # regenerated every run from snapshot/amendments.db. They go straight
          # into deploy-book via the snapshot artifact.
          git add lover/ forskrifter/ book/ _quarto.yml index.qmd laws.json README.md
          git rm -r --cached historie/ 2>/dev/null || true
          git rm --cached feed.xml 2>/dev/null || true
          git add historie/
          if git diff --staged --quiet; then
            echo "No changes to laws"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Oppdater lover og forskrifter fra Lovdata API $(date +%Y-%m-%d) [skip ci]"
            # Race with concurrent developer pushes is possible during a 10-minute run.
            # Rebase onto whatever landed on main while we were running, then push.
            for attempt in 1 2 3; do
              if git push; then
                break
              fi
              echo "Push attempt $attempt failed, rebasing and retrying..."
              git pull --rebase origin main || { echo "Rebase failed, aborting"; exit 1; }
              sleep 2
            done
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload snapshot for deploy-book
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: snapshot/amendments.db
          retention-days: 1
          if-no-files-found: error

  deploy-book:
    needs: update-laws
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e lovdata-publisher/

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Download snapshot from update-laws
        uses: actions/download-artifact@v4
        with:
          name: snapshot
          path: snapshot/

      - name: Render book
        run: quarto render

      - name: Copy laws.json to site
        run: cp laws.json _site/laws.json

      - name: Copy assets to site
        run: |
          # Belt-and-suspenders: Quarto's project.resources should copy
          # assets/, but in practice it didn't on this site (live verified:
          # /assets/banner.svg returned 404 after the resources directive was
          # added). Explicit cp avoids the issue. The 'cp -r src/. dst/'
          # pattern (with trailing dot) prevents the nesting bug where
          # 'cp -r assets _site/assets' produces _site/assets/assets/ when
          # the destination already exists.
          mkdir -p _site/assets
          cp -r assets/. _site/assets/

      - name: Generate Atom feed.xml directly into site
        run: python -m lovdata_publisher.feed snapshot _site/feed.xml

      - name: Generate per-law feeds directly into site
        run: |
          # Feeds aren't in git anymore (they're build artifacts). Regenerate
          # them into _site/feeds/ from the snapshot artifact we just downloaded.
          mkdir -p _site/feeds
          lovdata-publish --feeds-only --snapshot snapshot --output . --site-dir _site

      - name: Merge law metadata into search index
        run: python -m lovdata_publisher.search_index _site laws.json

      - name: Generate per-law HTML pages and full-text search index
        run: lovdata-publish --post-render --output . --site-dir _site

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
