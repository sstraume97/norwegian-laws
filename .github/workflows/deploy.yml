name: Update laws and deploy book

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'book/**'
      - '_quarto.yml'
      - 'pyproject.toml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-laws:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e .

      - name: Download and parse laws
        run: lovdata-pipeline --download --output . --db amendments.db --parse-only

      - name: Generate Quarto chapters
        run: python -m lovdata_pipeline.quarto . amendments.db

      - name: Commit law updates
        id: commit
        run: |
          git config user.name "Lovtidend"
          git config user.email "lovtidend@lovdata.no"
          git add lover/ book/ _quarto.yml index.qmd laws.json
          if git diff --staged --quiet; then
            echo "No changes to laws"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Oppdater lover fra Lovdata API $(date +%Y-%m-%d) [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy-book:
    needs: update-laws
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline
        run: pip install -e .

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        run: quarto render

      - name: Copy laws.json to site
        run: cp laws.json _site/laws.json

      - name: Merge law metadata into search index
        run: python -m lovdata_pipeline.search_index _site laws.json

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
